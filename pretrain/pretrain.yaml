MODEL:
  WEIGHTS: ''
dataloader:
  npz_folder: /data/truenas_B2/Dataset/001_6yXray/pretrain_npy
train:
  batch_size_per_gpu: 4
  dataset_path: ''
  output_dir: /home/yyi/X_ray/checkpoints1
  saveckp_freq: 1
  seed: 0
  num_workers: 8
  centering: "centering"
  resume_from_checkpoint: False
  OFFICIAL_EPOCH_LENGTH:   6050 # 每张 GPU 批处理大小 × GPU 数量 = 16 × 8 = 128，800,000 / 128 = 6250
student:
  arch: vit_base
  patch_size: 16
  drop_path_rate: 0.3
  layerscale: 1.0e-05
  drop_path_uniform: true
  pretrained_weights: ''
  ffn_layer: "mlp"
teacher:
  momentum_teacher: 0.992
  final_momentum_teacher: 1
  warmup_teacher_temp: 0.04
  teacher_temp: 0.07
  warmup_teacher_temp_epochs: 3
optim:
  epochs: 200
  weight_decay: 0.04
  weight_decay_end: 0.4
  base_lr: 0.0001  # learning rate for a batch size of 1024
  lr: 0.  # will be set after applying scaling rule
  warmup_epochs: 5
  min_lr: 1.0e-06
  clip_grad: 0.5
  freeze_last_layer_epochs: 1
  scaling_rule: sqrt_wrt_1024
  patch_embed_lr_mult: 0.2
  layerwise_decay: 0.9
  adamw_beta1: 0.9
  adamw_beta2: 0.999
crops:
  global_crops_scale:
  - 0.75
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.4
  global_crops_size: 1024
  local_crops_size: 112
evaluation:
  eval_period_iterations: 12500
